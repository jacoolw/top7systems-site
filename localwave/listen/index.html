<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Listen on Localwave</title>
<meta name="description" content="Listen to Australian community radio live on Localwave. Every town has a voice.">

<!-- Open Graph / Twitter card. Static hosting => one generic preview for all stations.
     For per-station previews, render these tags server-side (see web/README.md). -->
<meta property="og:type" content="music.radio_station">
<meta property="og:site_name" content="Localwave">
<meta property="og:title" content="Listen live on Localwave">
<meta property="og:description" content="Australian community radio. Every town has a voice. Tap to listen, or get the app.">
<meta property="og:image" content="https://top7systems.net/localwave/icon.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Listen live on Localwave">
<meta name="twitter:description" content="Australian community radio. Every town has a voice.">
<meta name="twitter:image" content="https://top7systems.net/localwave/icon.png">

<!-- iOS Safari smart app banner -->
<meta name="apple-itunes-app" content="app-id=6761519338">

<style>
  :root{--navy:#0B1D3A;--teal:#1A8A7D;--gold:#D4A843;--off:#F5F2EB;--grey:#6B7280;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       background:var(--off);color:var(--navy);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .card{background:#fff;border-radius:24px;box-shadow:0 20px 60px rgba(11,29,58,.12);max-width:420px;width:100%;padding:32px;text-align:center;}
  .badge{display:inline-block;font-size:12px;font-weight:700;letter-spacing:.08em;color:var(--teal);text-transform:uppercase;margin-bottom:16px;}
  .disc{width:96px;height:96px;border-radius:50%;margin:0 auto 20px;
        background:linear-gradient(135deg,var(--teal),rgba(26,138,125,.6));display:flex;align-items:center;justify-content:center;}
  .disc svg{width:44px;height:44px;fill:#fff;}
  h1{font-size:26px;line-height:1.2;margin-bottom:6px;}
  .meta{color:var(--grey);font-size:15px;margin-bottom:24px;min-height:1em;}
  button.listen{width:100%;border:0;border-radius:14px;background:var(--teal);color:#fff;font-size:18px;font-weight:700;padding:16px;cursor:pointer;}
  button.listen:active{opacity:.85;}
  audio{width:100%;margin-top:16px;}
  .get{margin-top:28px;padding-top:24px;border-top:1px solid #eee;}
  .get p{font-size:14px;color:var(--grey);margin-bottom:14px;}
  .stores{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
  .stores a{flex:1;min-width:140px;text-decoration:none;border:1px solid var(--navy);border-radius:12px;padding:12px;font-weight:600;color:var(--navy);font-size:14px;}
  .stores .soon{flex:1;min-width:140px;border:1px dashed var(--grey);border-radius:12px;padding:12px;font-weight:600;color:var(--grey);font-size:14px;background:rgba(107,114,128,.06);cursor:default;}
  .tagline{margin-top:24px;font-size:13px;color:var(--grey);}
  .err{color:#C4521A;font-size:15px;}
</style>
</head>
<body>
<div class="card">
  <div class="disc" aria-hidden="true">
    <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm0 14a4 4 0 110-8 4 4 0 010 8z"/></svg>
  </div>
  <div class="badge">Live on Localwave</div>
  <h1 id="name">Loading station…</h1>
  <div class="meta" id="meta"></div>
  <button class="listen" id="listen" hidden>▶ Listen now</button>
  <audio id="audio" controls hidden preload="none"></audio>
  <div id="error" class="err" hidden>Sorry, we couldn't find that station, but you can still get the app below.</div>

  <div class="get">
    <p>Discover 1,100+ Australian stations on a live map.</p>
    <div class="stores">
      <a id="appstore" href="https://apps.apple.com/app/id6761519338">Get it on the App&nbsp;Store</a>
      <span id="playstore" class="soon">Android coming soon</span>
    </div>
  </div>
  <div class="tagline">Localwave. Every town has a voice. Find it.</div>
</div>

<script>
(function () {
  var params = new URLSearchParams(location.search);
  var id = params.get('s');
  if (!id) { // path form fallback: /localwave/listen/<id>
    var m = location.pathname.match(/\/localwave\/listen\/([^\/?#]+)/);
    if (m) id = decodeURIComponent(m[1]);
  }

  // Android is still in testing — surface its "coming soon" pill first for Android visitors.
  var ua = navigator.userAgent || '';
  if (/android/i.test(ua)) document.getElementById('playstore').style.order = '-1';

  var nameEl = document.getElementById('name'),
      metaEl = document.getElementById('meta'),
      listenEl = document.getElementById('listen'),
      audioEl = document.getElementById('audio'),
      errEl = document.getElementById('error');

  function showError() { nameEl.textContent = 'Localwave'; metaEl.textContent = ''; errEl.hidden = false; }

  if (!id) { showError(); return; }

  fetch('../stations.json')
    .then(function (r) { return r.json(); })
    .then(function (db) {
      var list = db.stations || db;
      var st = list.find(function (s) { return s.id === id; });
      if (!st) { showError(); return; }
      document.title = st.name + ', live on Localwave';
      nameEl.textContent = st.name;
      var bits = [];
      if (st.frequency) bits.push(st.frequency);
      if (st.city) bits.push(st.city);
      if (st.state) bits.push(st.state);
      metaEl.textContent = bits.join(' · ');
      var stream = st.streamURL || st.streamURLHQ;
      if (stream) {
        audioEl.src = stream;
        listenEl.hidden = false;
        listenEl.addEventListener('click', function () {
          audioEl.hidden = false;
          audioEl.play();
          listenEl.hidden = true;
        });
      }
    })
    .catch(showError);
})();
</script>
</body>
</html>
