<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="ABS Cube">
  <defs>
    <linearGradient id="abscube-bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00a651"/>
      <stop offset="1" stop-color="#00662f"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#abscube-bg)"/>
  <!-- subtle baseline -->
  <line x1="12" y1="48" x2="52" y2="48" stroke="#ffffff" stroke-opacity="0.25" stroke-width="2" stroke-linecap="round"/>
  <!-- gold rising trend line (forecast) -->
  <polyline points="12,42 22,36 31,39 41,26 52,16" fill="none" stroke="#ffcd00" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="52" cy="16" r="3.4" fill="#ffcd00"/>
</svg>
